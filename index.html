<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Tabel Spreadsheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #toast { transition: all 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 translate-y-10 z-50 hidden flex items-center gap-2">
        <span>🔔 Data telah diperbarui!</span>
    </div>

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Hasil Data Spreadsheet (Auto-Update)</h1>
        
        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <div id="loader" class="p-10 flex justify-center">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
            </div>
            <div id="tableContainer" class="overflow-x-auto hidden">
                <table class="w-full text-left border-collapse" id="dataTable">
                    <thead>
                        <tr class="bg-gray-100 border-b" id="tableHead"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Fungsi untuk memainkan suara "ding" sederhana menggunakan Web Audio API
        function playNotificationSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime); // Frekuensi tinggi
            osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVmjZZxbOA-vnukBTaRyx-hR6ocWtXTO60vqNB8zT0qw-FrICV_R5hA75hdNKDGkwN8Q/exec';
        let lastDataString = "";

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                if (data.length > 0) {
                    const currentDataString = JSON.stringify(data);
                    
                    if (lastDataString !== "" && currentDataString !== lastDataString) {
                        showNotification();
                    }
                    
                    lastDataString = currentDataString;
                    renderTable(data);
                }
            } catch (error) {
                console.error("Gagal mengambil data:", error);
            }
        }

        function showNotification() {
            // Mainkan suara
            playNotificationSound();

            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-10'); }, 100);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                setTimeout(() => { toast.classList.add('hidden'); }, 500);
            }, 3000);
        }

        function renderTable(data) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            
            head.innerHTML = '';
            body.innerHTML = '';
            
            data[0].forEach(header => {
                head.innerHTML += `<th class="py-3 px-4 font-semibold text-gray-700">${header}</th>`;
            });

            for (let i = 1; i < data.length; i++) {
                let rowHtml = '<tr class="border-b hover:bg-gray-50">';
                data[i].forEach(cell => {
                    rowHtml += `<td class="py-3 px-4 text-gray-600">${cell}</td>`;
                });
                rowHtml += '</tr>';
                body.innerHTML += rowHtml;
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('tableContainer').classList.remove('hidden');
        }

        fetchData();
        setInterval(fetchData, 1000);
    </script>
</body>
</html>
